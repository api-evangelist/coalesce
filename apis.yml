aid: coalesce
name: Coalesce
description: >-
  Coalesce is a unified data transformation platform built for Snowflake that
  combines transformation, cataloging, and quality monitoring into a single
  operating layer. It provides REST APIs for managing projects, environments,
  nodes, deployments, runs, and column-level documentation in data warehouse
  pipelines, enabling teams to automate runs, query metadata, and integrate
  Coalesce into CI/CD workflows.
