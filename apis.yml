    name: Coalesce API
    description: >-
      REST API for integrating with Coalesce and scaling your application.
      Enables automation of pipeline runs, querying metadata about nodes and
      environments, user management, git account configuration, project
      management, and CI/CD integration for data warehouse transformation
      pipelines built on Snowflake.
